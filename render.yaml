services:
  - name: shopping-assistant-backend
    type: web
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: backend/Dockerfile.render
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: SHOPPING_DB_PATH
        value: /tmp/shopping.db
      - key: TURSO_DATABASE_URL
        value: libsql://shopping-assistant-core-tanh1c.aws-ap-northeast-1.turso.io
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: TURSO_SYNC_INTERVAL_SECONDS
        value: "30"
      - key: AUTO_IMPORT_REFERENCE_PRICES
        value: "true"
      - key: REFERENCE_PRICE_CSV_PATH
        value: /app/data/reference_prices.csv
      - key: SEED_MOCK_DATA
        value: "false"
      - key: FRONTEND_URL
        value: https://shopping-assistant-frontend-g2pi.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://shopping-assistant-frontend-g2pi.onrender.com
      - key: LOG_LEVEL
        value: INFO

  - name: shopping-assistant-ai-pipeline
    type: web
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ai-pipeline/Dockerfile.render
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: ENABLE_BACKEND_SYNC
        value: "true"
      - key: BACKEND_URL
        value: https://shopping-assistant-backend.onrender.com
      - key: BACKEND_SCAN_API_URL
        value: https://shopping-assistant-backend.onrender.com/api/scan
      - key: OPENAI_API_KEY
        sync: false
      - key: LLM_PROVIDER
        value: openai
      - key: LLM_BASE_URL
        value: https://api.openai.com/v1
      - key: LLM_MODEL
        value: gpt-5.4-mini
      - key: TTS_PROVIDER
        value: vieneu
      - key: INFER_SAVE_DEBUG_UPLOADS
        value: "false"
      - key: LOG_LEVEL
        value: INFO

  - name: shopping-assistant-frontend
    type: web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://shopping-assistant-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
